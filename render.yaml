services:
  - type: web
    name: ohey-backend
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: OHEY_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OHEY_ADMIN_EMAILS
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FCM_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
