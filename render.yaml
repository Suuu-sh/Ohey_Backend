services:
  - type: web
    name: ohey-backend
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: OHEY_ADMIN_EMAILS
        sync: false
      - key: DATA_STORE
        value: neon
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_MAX_CONNS
        value: "10"
      - key: AUTH_PROVIDER
        value: clerk
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_AUDIENCE
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_REPLY_TO_EMAIL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: ohey-public
      - key: R2_PUBLIC_URL
        sync: false
      - key: FCM_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ORIGIN_VERIFY_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://oheyapp.com,https://www.oheyapp.com"
