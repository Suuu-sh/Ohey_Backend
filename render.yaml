services:
  - type: web
    name: ohey-backend
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: OHEY_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OHEY_ADMIN_EMAILS
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATA_STORE
        value: supabase
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_MAX_CONNS
        value: "10"
      - key: AUTH_PROVIDER
        value: supabase
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_AUDIENCE
        sync: false
      - key: FCM_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
