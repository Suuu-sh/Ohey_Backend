services:
  - type: web
    name: nomo-backend
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: NOMO_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: NOMO_ADMIN_EMAILS
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
